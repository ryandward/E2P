<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // SPA redirect: rewrite path as query string so index.html can restore it
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/E2P/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
</html>
